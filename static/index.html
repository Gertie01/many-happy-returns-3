<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sora 2 Unlimited Video Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sora 2 Generator</h1>
        <p class="license">Licensed under Apache License 2.0 | Unlimited Free Access</p>
        
        <div class="form-group">
            <label>Prompt</label>
            <textarea id="prompt" placeholder="Describe the scene..."></textarea>
        </div>

        <div class="settings">
            <div>
                <label>Aspect Ratio</label>
                <select id="ratio">
                    <option value="16:9">16:9</option>
                </select>
            </div>
            <div>
                <label>Duration</label>
                <select id="duration">
                    <option value="15">15 Seconds</option>
                </select>
            </div>
        </div>

        <div id="character-section">
            <h3>Character References (Max 10)</h3>
            <div id="char-list"></div>
            <button onclick="addCharacter()" id="add-char-btn">+ Add Character</button>
        </div>

        <button id="generate-btn" onclick="generate()">Generate Video</button>

        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
